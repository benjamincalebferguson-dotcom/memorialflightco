<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" fill="none">

  <!-- Drone arms (X pattern from centre) -->
  <line x1="36" y1="36" x2="12" y2="12" stroke="#c99b6d" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="60" y2="12" stroke="#c99b6d" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="12" y2="60" stroke="#c99b6d" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="60" y2="60" stroke="#c99b6d" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Rotor rings -->
  <circle cx="12" cy="12" r="9" stroke="#c99b6d" stroke-width="1.5"/>
  <circle cx="60" cy="12" r="9" stroke="#c99b6d" stroke-width="1.5"/>
  <circle cx="12" cy="60" r="9" stroke="#c99b6d" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="9" stroke="#c99b6d" stroke-width="1.5"/>

  <!-- Centre body -->
  <circle cx="36" cy="36" r="4" fill="#c99b6d"/>
  <circle cx="36" cy="36" r="7.5" stroke="#c99b6d" stroke-width="1" opacity="0.35"/>

  <!-- Scatter dots below (ceremony) -->
  <circle cx="28" cy="68" r="1.2" fill="#c99b6d" opacity="0.45"/>
  <circle cx="33" cy="70" r="0.9" fill="#c99b6d" opacity="0.3"/>
  <circle cx="36" cy="67" r="1.5" fill="#c99b6d" opacity="0.55"/>
  <circle cx="40" cy="70" r="0.8" fill="#c99b6d" opacity="0.3"/>
  <circle cx="44" cy="68" r="1.1" fill="#c99b6d" opacity="0.4"/>

  <!-- Divider -->
  <line x1="82" y1="10" x2="82" y2="62" stroke="#c99b6d" stroke-width="0.8" opacity="0.28"/>

  <!-- Wordmark -->
  <text x="96" y="33"
        font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif"
        font-size="21"
        font-weight="400"
        letter-spacing="5"
        fill="#2d1a0e">MEMORIAL</text>

  <text x="96" y="55"
        font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif"
        font-size="21"
        font-weight="400"
        letter-spacing="5"
        fill="#2d1a0e">FLIGHT CO</text>

  <!-- Thin accent rule -->
  <line x1="96" y1="62" x2="332" y2="62" stroke="#c99b6d" stroke-width="0.7" opacity="0.3"/>

</svg>
